<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hexbuffer</title>
  <!-- ponytail: zero-dependency native HTML/CSS splash screen with authentic triangle logo animations and spinner -->
  <style>
    :root {
      color-scheme: dark;
      --primary: #00c950;
      --background: #000000;
      --foreground: #ffffff;
      --muted-foreground: #94a3b8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--background);
      color: var(--foreground);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .splash-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .brand-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    /* Triangle Logo styles match src/layout/triangle-logo.tsx */
    .triangle-logo {
      position: relative;
      display: inline-flex;
      width: 1.5rem;
      height: 1.5rem;
      color: var(--primary);
      flex-shrink: 0;
      animation: triangle-pulse 2.8s cubic-bezier(0.45, 0, 0.2, 1) infinite;
    }

    .triangle-icon {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      transform-origin: center;
      stroke: currentColor;
      will-change: opacity, transform;
    }

    .triangle-icon.solid {
      animation: triangle-solid 2.8s cubic-bezier(0.45, 0, 0.2, 1) infinite;
    }

    .triangle-icon.dashed {
      animation: triangle-dashed 2.8s cubic-bezier(0.45, 0, 0.2, 1) infinite;
    }

    .brand-title {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: -0.025em;
      color: var(--primary);
    }


    @keyframes triangle-pulse {

      0%,
      100% {
        transform: scale(1);
      }

      45% {
        transform: scale(1.08);
      }
    }

    @keyframes triangle-solid {

      0%,
      38%,
      100% {
        opacity: 1;
        transform: rotate(0deg) scale(1);
      }

      50%,
      88% {
        opacity: 0;
        transform: rotate(8deg) scale(0.88);
      }
    }

    @keyframes triangle-dashed {

      0%,
      38%,
      100% {
        opacity: 0;
        transform: rotate(-8deg) scale(0.88);
      }

      50%,
      88% {
        opacity: 1;
        transform: rotate(0deg) scale(1);
      }
    }

  </style>
</head>
