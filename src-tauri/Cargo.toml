[package]
name = "apprecon"
version = "0.1.0"
description = "API Traffic Monitor for Bug Bounty"
authors = ["Arham"]
edition = "2021"

[lib]
name = "apprecon_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
hyper = { version = "1", features = ["http1", "http2"] }
hyper-util = { version = "0.1", features = ["tokio", "http1", "http2"] }
http-body-util = "0.1"
tokio-tungstenite = "0.27"
futures-util = "0.3"
log = "0.4"
env_logger = "0.11"
chrono = "0.4"
parking_lot = "0.12"
once_cell = "1"
rusqlite = { version = "0.32", features = ["bundled"] }
rcgen = "0.13"
ring = "0.17"
pem = "3"
x509-parser = "0.16"
rustls = "0.23"
tokio-rustls = "0.26"
sha2 = "0.10"
reqwest = { version = "0.12", features = ["json", "cookies"] }
url = "2"

[profile.release]
strip = true
lto = true
codegen-units = 1
